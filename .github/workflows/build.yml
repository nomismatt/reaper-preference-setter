name: Build Executables

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true

  build_macos:
    needs: create_release
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --console --name "REAPER-Preference-Setter" configure_reaper.py

      - name: Import Apple Certificate
        run: |
          if security list-keychains | grep -q "github_build.keychain"; then
            security delete-keychain github_build.keychain
          fi
          security create-keychain -p "" github_build.keychain
          security default-keychain -s github_build.keychain
          security set-keychain-settings -lut 21600 github_build.keychain
          echo "${{ secrets.APPLE_CERTIFICATE }}" | base64 --decode > apple_certificate.p12
          security import apple_certificate.p12 -k github_build.keychain -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -t cert -f pkcs12 -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcrun
          security unlock-keychain -p "" github_build.keychain
          security set-key-partition-list -S 'apple-tool:,apple:' -s -k "" github_build.keychain
          security list-keychain -d user -s github_build.keychain 'login-keychain'

      - name: Unlock keychain
        run: |
          security unlock-keychain -p "" github_build.keychain
          security set-key-partition-list -S apple-tool:,apple: -k "" -D "Developer" -t private github_build.keychain

      - name: Codesign executable
        run: |
          codesign -s "${{ secrets.APPLE_CERTIFICATE_NAME }}" \
            --entitlements entitlements.plist \
            --force \
            --timestamp \
            --options runtime \
            "dist/REAPER-Preference-Setter"
          codesign --verify --verbose=4 "dist/REAPER-Preference-Setter"

      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          cp "dist/REAPER-Preference-Setter" dmg_contents/
          hdiutil create -volname "REAPER Preference Setter" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            "REAPER-Preference-Setter-macOS.dmg"

      - name: Notarize DMG
        run: |
          xcrun notarytool submit "REAPER-Preference-Setter-macOS.dmg" \
            --apple-id "${{ secrets.APPLE_DEVELOPER_ID_USER }}" \
            --password "${{ secrets.APPLE_DEVELOPER_ID_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_DEVELOPER_ID_TEAM }}" \
            --wait --verbose

      - name: Staple DMG
        run: |
          xcrun stapler staple "REAPER-Preference-Setter-macOS.dmg"
          xcrun stapler validate "REAPER-Preference-Setter-macOS.dmg"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            REAPER-Preference-Setter-macOS.dmg

  build_windows:
    needs: create_release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --console --name "REAPER-Preference-Setter" configure_reaper.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/REAPER-Preference-Setter.exe

  build_linux:
    needs: create_release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --console --name "REAPER-Preference-Setter" configure_reaper.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/REAPER-Preference-Setter
